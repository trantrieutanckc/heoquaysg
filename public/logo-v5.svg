<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#8C1912"/>

  <!-- Gold border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#E8B84B" stroke-width="3"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#E8B84B" stroke-width="0.8" opacity="0.5"/>

  <!-- Left ear -->
  <circle cx="28" cy="25" r="12" fill="white"/>
  <circle cx="28" cy="28" r="6.5" fill="#C47A1A"/>

  <!-- Right ear -->
  <circle cx="72" cy="25" r="12" fill="white"/>
  <circle cx="72" cy="28" r="6.5" fill="#C47A1A"/>

  <!-- Face -->
  <circle cx="50" cy="57" r="32" fill="white"/>

  <!-- Eyes -->
  <circle cx="38" cy="50" r="5" fill="#2A0606"/>
  <circle cx="62" cy="50" r="5" fill="#2A0606"/>
  <circle cx="40" cy="47.5" r="2" fill="white"/>
  <circle cx="64" cy="47.5" r="2" fill="white"/>

  <!-- Snout -->
  <ellipse cx="50" cy="65" rx="14" ry="10" fill="#C47A1A"/>
  <circle cx="44" cy="66" r="3.5" fill="#2A0606"/>
  <circle cx="56" cy="66" r="3.5" fill="#2A0606"/>

  <!-- Smile -->
  <path d="M 39,77 C 44,84 56,84 61,77"
        fill="none" stroke="#2A0606" stroke-width="2.5" stroke-linecap="round"/>
</svg>
