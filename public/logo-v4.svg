<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FAC020"/>
      <stop offset="100%" stop-color="#E89C08"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="32%" cy="22%" r="76%">
      <stop offset="0%" stop-color="#FFF2DC"/>
      <stop offset="52%" stop-color="#FFBE88"/>
      <stop offset="100%" stop-color="#E88050"/>
    </radialGradient>
    <radialGradient id="earOut" cx="36%" cy="26%" r="72%">
      <stop offset="0%" stop-color="#FFCA98"/>
      <stop offset="100%" stop-color="#D87040"/>
    </radialGradient>
    <radialGradient id="earIn" cx="36%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#FFAE7A"/>
      <stop offset="100%" stop-color="#E06848"/>
    </radialGradient>
    <radialGradient id="snoutGrad" cx="30%" cy="18%" r="76%">
      <stop offset="0%" stop-color="#FFE8D0"/>
      <stop offset="100%" stop-color="#DE8058"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="28%" cy="24%" r="72%">
      <stop offset="0%" stop-color="#9B4C22"/>
      <stop offset="100%" stop-color="#180602"/>
    </radialGradient>
    <linearGradient id="ribGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D02818"/>
      <stop offset="100%" stop-color="#700E08"/>
    </linearGradient>
    <linearGradient id="ribSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <path id="topArc" d="M 18,120 A 102,102 0 0,1 222,120"/>
    <filter id="faceShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#7B2000" flood-opacity="0.22"/>
    </filter>
    <filter id="ribShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <clipPath id="clip"><circle cx="120" cy="120" r="118"/></clipPath>
  </defs>

  <!-- Badge -->
  <circle cx="120" cy="120" r="119" fill="url(#bg)"/>

  <!-- Sunburst -->
  <g clip-path="url(#clip)" opacity="0.13" stroke="#8B1A08" stroke-width="1.5">
    <line x1="120" y1="120" x2="120" y2="2"/>
    <line x1="120" y1="120" x2="205" y2="35"/>
    <line x1="120" y1="120" x2="238" y2="120"/>
    <line x1="120" y1="120" x2="205" y2="205"/>
    <line x1="120" y1="120" x2="120" y2="238"/>
    <line x1="120" y1="120" x2="35" y2="205"/>
    <line x1="120" y1="120" x2="2" y2="120"/>
    <line x1="120" y1="120" x2="35" y2="35"/>
    <line x1="120" y1="120" x2="172" y2="8"/>
    <line x1="120" y1="120" x2="232" y2="68"/>
    <line x1="120" y1="120" x2="232" y2="172"/>
    <line x1="120" y1="120" x2="172" y2="232"/>
    <line x1="120" y1="120" x2="68" y2="232"/>
    <line x1="120" y1="120" x2="8" y2="172"/>
    <line x1="120" y1="120" x2="8" y2="68"/>
    <line x1="120" y1="120" x2="68" y2="8"/>
  </g>

  <!-- Rings -->
  <circle cx="120" cy="120" r="118" fill="none" stroke="#8B1A08" stroke-width="6.5"/>
  <circle cx="120" cy="120" r="110" fill="none" stroke="#8B1A08" stroke-width="1.5" opacity="0.38"/>

  <!-- Top text -->
  <text font-family="Arial Black,Impact,sans-serif" font-size="13.5" font-weight="900" fill="#8B1A08" letter-spacing="2.2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">HEO QUAY BÌNH TÂN</textPath>
  </text>

  <!-- ==== PIG (shifted up 12px) ==== -->

  <!-- Left ear -->
  <circle cx="76" cy="74" r="33" fill="url(#earOut)"/>
  <circle cx="76" cy="74" r="21" fill="url(#earIn)"/>

  <!-- Right ear -->
  <circle cx="164" cy="74" r="33" fill="url(#earOut)"/>
  <circle cx="164" cy="74" r="21" fill="url(#earIn)"/>

  <!-- Face -->
  <circle cx="120" cy="133" r="74" fill="url(#faceGrad)" filter="url(#faceShadow)"/>
  <ellipse cx="97" cy="106" rx="25" ry="14" fill="white" opacity="0.13" transform="rotate(-22 97 106)"/>

  <!-- Sparkles -->
  <text x="62" y="100" font-size="16" fill="#FFE020" text-anchor="middle">✦</text>
  <text x="178" y="100" font-size="16" fill="#FFE020" text-anchor="middle">✦</text>

  <!-- Eyebrows -->
  <path d="M80,96 C89,88 109,88 116,94" fill="none" stroke="#7B2E10" stroke-width="5" stroke-linecap="round"/>
  <path d="M124,94 C131,88 151,88 160,96" fill="none" stroke="#7B2E10" stroke-width="5" stroke-linecap="round"/>

  <!-- LEFT EYE: normal round -->
  <ellipse cx="99" cy="119" rx="21" ry="23" fill="white"/>
  <ellipse cx="99" cy="119" rx="21" ry="23" fill="none" stroke="#D08050" stroke-width="1" opacity="0.3"/>
  <circle cx="101" cy="121" r="16" fill="url(#irisGrad)"/>
  <circle cx="102" cy="123" r="10" fill="#060201"/>
  <circle cx="94" cy="112" r="7" fill="white" opacity="0.92"/>
  <circle cx="106" cy="128" r="3.2" fill="white" opacity="0.55"/>
  <ellipse cx="78" cy="139" rx="17" ry="12" fill="#FF4848" opacity="0.25"/>

  <!-- RIGHT EYE: big sparkly -->
  <ellipse cx="141" cy="119" rx="21" ry="23" fill="white"/>
  <ellipse cx="141" cy="119" rx="21" ry="23" fill="none" stroke="#D08050" stroke-width="1" opacity="0.3"/>
  <circle cx="139" cy="121" r="16" fill="url(#irisGrad)"/>
  <circle cx="138" cy="123" r="10" fill="#060201"/>
  <circle cx="132" cy="113" r="7" fill="white" opacity="0.92"/>
  <circle cx="145" cy="128" r="3.2" fill="white" opacity="0.55"/>
  <circle cx="148" cy="115" r="1.8" fill="white" opacity="0.7"/>
  <ellipse cx="163" cy="139" rx="18" ry="13" fill="#FF4848" opacity="0.25"/>

  <!-- Snout -->
  <ellipse cx="120" cy="159" rx="33" ry="27" fill="url(#snoutGrad)"/>
  <ellipse cx="120" cy="159" rx="33" ry="27" fill="none" stroke="#D07848" stroke-width="1.2" opacity="0.28"/>
  <ellipse cx="107" cy="147" rx="12" ry="6.5" fill="white" opacity="0.17" transform="rotate(-14 107 147)"/>
  <circle cx="109" cy="163" r="10" fill="#BF4020"/>
  <circle cx="131" cy="163" r="10" fill="#BF4020"/>
  <circle cx="106" cy="160" r="3.8" fill="white" opacity="0.13"/>
  <circle cx="128" cy="160" r="3.8" fill="white" opacity="0.13"/>

  <!-- Smile -->
  <path d="M98,178 C108,194 132,194 142,178" fill="none" stroke="#8B3010" stroke-width="4" stroke-linecap="round"/>
  <path d="M102,180 C108,190 132,190 138,180 L138,183 C132,192 108,192 102,183 Z" fill="white" opacity="0.8"/>

  <!-- ==== RIBBON bottom ==== -->
  <g filter="url(#ribShadow)">
    <rect x="2" y="186" width="236" height="32" fill="url(#ribGrad)"/>
    <path d="M 2,186 L 26,186 L 14,202 L 26,218 L 2,218 Z" fill="url(#ribGrad)"/>
    <path d="M 238,186 L 214,186 L 226,202 L 214,218 L 238,218 Z" fill="url(#ribGrad)"/>
    <path d="M 26,186 L 14,202 L 26,218" fill="none" stroke="#5C0A06" stroke-width="1.5"/>
    <path d="M 214,186 L 226,202 L 214,218" fill="none" stroke="#5C0A06" stroke-width="1.5"/>
    <rect x="2" y="186" width="236" height="13" fill="url(#ribSheen)"/>
    <line x1="26" y1="216" x2="214" y2="216" stroke="#3A0604" stroke-width="1.5" opacity="0.4"/>
    <text x="120" y="207" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-size="12" font-weight="900" fill="#FFD060" letter-spacing="1.8">HEO QUAY BÌNH TÂN</text>
    <circle cx="38" cy="202" r="2.5" fill="#FFD060" opacity="0.65"/>
    <circle cx="202" cy="202" r="2.5" fill="#FFD060" opacity="0.65"/>
  </g>
</svg>
